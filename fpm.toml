name = "fortsparse"
version = "0.1.0"
description = "Unified backend-pluggable sparse direct solver for Fortran"
author = "Christopher Albert"
maintainer = "albert@tugraz.at"
license = "MIT"
copyright = "Copyright 2025, lazy-fortran"

[build]
auto-tests = true
# SuperLU (BSD) is the default in-process direct-solver backend, bound through
# the MIT C shim under src/superlu. The library links only permissive code;
# UMFPACK (GPL) is reached out-of-process via a separate helper binary.
link = ["superlu"]

[fortran]
implicit-typing = false
source-form = "free"

# fpm always compiles src/ and links SuperLU, so the SuperLU backend is always
# present under fpm. Define FORTSPARSE_HAVE_SUPERLU for the preprocessed solver
# source to keep the fpm build consistent with that.
[preprocess]
[preprocess.cpp]
macros = ["FORTSPARSE_HAVE_SUPERLU"]
